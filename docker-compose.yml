services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - reflex_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    build:
      context: ./admin
      args:
        - VITE_BACKEND_URL=https://training.pyuscraft.space/api
        - VITE_BACKEND_WS_URL=wss://training.pyuscraft.space/api/ws
    expose:
      - "80"
    depends_on:
      - backend

  reflex-app:
    build:
      context: ./app
      args:
        - VITE_BACKEND_URL=https://training.pyuscraft.space/api
        - VITE_BACKEND_WS_URL=wss://training.pyuscraft.space/api/ws
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_started
      reflex-app:
        condition: service_started

volumes:
  reflex_data:
