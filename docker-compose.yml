services:
  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    volumes:
      - reflex_data:/app/data

  admin:
    build:
      context: ./admin
      args:
        - VITE_BACKEND_URL=https://training.pyuscraft.space/api
        - VITE_BACKEND_WS_URL=wss://training.pyuscraft.space/api/ws
    expose:
      - "80"
    depends_on:
      - backend

  reflex-app:
    build:
      context: ./app
      args:
        - VITE_BACKEND_URL=https://training.pyuscraft.space/api
        - VITE_BACKEND_WS_URL=wss://training.pyuscraft.space/api/ws
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - admin
      - reflex-app

volumes:
  reflex_data:
